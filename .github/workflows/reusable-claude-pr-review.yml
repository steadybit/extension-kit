##
# Reusable workflow for automated Claude Code PR reviews.
#
# Usage in an extension:
#
#   name: Claude Code Review
#   on:
#     pull_request:
#       branches: [main]
#       types: [opened, synchronize, ready_for_review, reopened]
#   jobs:
#     claude-review:
#       uses: steadybit/extension-kit/.github/workflows/reusable-claude-pr-review.yml@main
#       secrets: inherit

name: Claude Code Review (reusable)

on:
  workflow_call:

jobs:
  claude-review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Resolve Claude token for PR author
        id: resolve-token
        run: |
          case "${{ github.event.pull_request.user.login }}" in
            ReuDa)           echo "token_name=CLAUDE_CODE_TOKEN_DANIEL" >> "$GITHUB_OUTPUT" ;;
            joshiste)        echo "token_name=CLAUDE_CODE_TOKEN_JOHANNES" >> "$GITHUB_OUTPUT" ;;
            bertschneider)   echo "token_name=CLAUDE_CODE_TOKEN_NORBERT" >> "$GITHUB_OUTPUT" ;;
            ManuelGerding)   echo "token_name=CLAUDE_CODE_TOKEN_MANUEL" >> "$GITHUB_OUTPUT" ;;
            achoimet)        echo "token_name=CLAUDE_CODE_TOKEN_ANTOINE" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::No Claude token configured for user '${{ github.event.pull_request.user.login }}'"
              exit 1
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1 # NOSONAR githubactions:S7637 - verified action creator
        with:
          claude_code_oauth_token: ${{ secrets[steps.resolve-token.outputs.token_name] }}
          track_progress: true
          use_sticky_comment: true
          include_fix_links: false
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            HEAD SHA: ${{ github.event.pull_request.head.sha }}

            ## Step 1: Resolve previously addressed review threads

            Before reviewing new changes, check whether any of your prior unresolved
            review comments have been addressed in the current HEAD.

            1. Fetch unresolved review threads on this PR using GraphQL:

               ```
               gh api graphql -f query='
                 query($owner:String!,$repo:String!,$number:Int!) {
                   repository(owner:$owner,name:$repo) {
                     pullRequest(number:$number) {
                       reviewThreads(first:100) {
                         nodes {
                           id isResolved isOutdated
                           comments(first:10) {
                             nodes { author{login} body path line originalLine diffHunk }
                           }
                         }
                       }
                     }
                   }
                 }' -F owner=<owner> -F repo=<repo> -F number=<number>
               ```

            2. For each thread that is NOT resolved AND was authored by you (the
               Claude bot account), inspect the referenced file/line at HEAD and
               determine whether the issue has been fixed.

            3. If the issue is fixed:
               - Post a short reply on the thread linking to the fixing commit:
                 `Addressed in ${{ github.event.pull_request.head.sha }} — https://github.com/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }}`
                 (use `gh api` to POST a reply via
                 `repos/{owner}/{repo}/pulls/{number}/comments/{comment_id}/replies`).
               - Resolve the thread with the `resolveReviewThread` mutation:

                 ```
                 gh api graphql -f query='
                   mutation($id:ID!){ resolveReviewThread(input:{threadId:$id}){ thread{ id isResolved } } }
                 ' -F id=<threadId>
                 ```

            4. If the issue is NOT fixed, leave the thread alone.

            Do not resolve threads authored by humans.

            ## Step 2: Review new changes

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Performance considerations
            - Race conditions or concurrency issues
            - Obvious typos that affect correctness

            Do NOT comment on:
            - Style, formatting, or naming preferences
            - Missing tests or documentation
            - Refactoring suggestions
            - Things that were already present before this PR
            - Things that were already covered by a comment in this PR and are still unresolved. You may note it in the summary, but keep it short.

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api graphql:*),Bash(gh api repos/*)"

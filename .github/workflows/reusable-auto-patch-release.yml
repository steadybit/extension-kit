##
# This workflow is intended to run on a weekly schedule (Mondays).
# It cuts a patch release if all commits since the latest version tag are
# "safe" (dependabot bumps, trivyignore-only changes, the auto-emitted
# chart-version bump). Otherwise it skips and reports the reason to Slack.
#
# The pushed tag triggers each repo's existing ci.yml (push.tags: 'v*'),
# which runs the existing reusable CI -> GoReleaser -> full release.
##

name: auto-patch-release

on:
  workflow_call:
    inputs:
      VERSION_BUMPER_APPID:
        type: string
        required: true
        description: GitHub App ID used to bypass branch protection on main
      dry_run:
        type: boolean
        default: false
        description: If true, evaluate and log the would-be release without committing, tagging, pushing, or notifying Slack
      force_release:
        type: boolean
        default: false
        description: If true, release even when the commit range contains unsafe commits — intended for manual recovery runs
      release_type:
        type: string
        default: patch
        description: Which component of the version to bump — major, minor, or patch (default)
      changelog_ignore_regex:
        type: string
        default: '^chore(\(deps\))?: update helm chart version$|^docs:|^test:|^chore: update (\.)?trivy|^chore\(trivy\):'
        description: |
          POSIX-extended regex of commit subjects to ignore. Matched commits
          are treated as non-events — they neither trigger a release nor
          appear in CHANGELOG.md. If every commit in the range matches, the
          workflow silently exits with no-commits. Default skips the
          auto-emitted helm chart bumps (legacy and current message), docs
          commits, and trivy-ignore-list updates.
      slack_channel:
        type: string
        default: C0BA547TUKC
        description: Slack channel ID to override in the webhook payload (default = #sig-releases)
    secrets:
      VERSION_BUMPER_SECRET:
        required: true
        description: Private key of the GitHub App matching VERSION_BUMPER_APPID
      SLACK_WEBHOOK_URL:
        required: true
        description: Existing org-level Slack webhook URL

concurrency:
  group: auto-patch-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-patch-release:
    name: ${{ inputs.force_release && format('Force {0} release', inputs.release_type) || format('Auto {0} release', inputs.release_type) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ inputs.VERSION_BUMPER_APPID }}
          private-key: ${{ secrets.VERSION_BUMPER_SECRET }}

      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Determine latest version tag
        id: latest
        run: |
          set -euo pipefail
          tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -z "$tag" ]; then
            echo "::error::No version tag matching v[0-9]*.[0-9]*.[0-9]* found"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Latest version tag: $tag"

      - name: Evaluate commits since latest tag
        id: evaluate
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
          FORCE_RELEASE: ${{ inputs.force_release }}
          IGNORE_REGEX: ${{ inputs.changelog_ignore_regex }}
        run: |
          set -euo pipefail

          commits=$(git log --no-merges --format='%H' "${LATEST_TAG}..HEAD" || true)
          if [ -z "$commits" ]; then
            echo "outcome=no-commits" >> "$GITHUB_OUTPUT"
            echo "commit_count=0" >> "$GITHUB_OUTPUT"
            echo "No non-merge commits since ${LATEST_TAG}"
            echo "## :zzz: No commits since \`${LATEST_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          count=0
          ignored=0
          unsafe_count=0
          unsafe_sha=""
          all_rows=""
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            author_email=$(git log -1 --format='%ae' "$sha")
            author_name=$(git log -1 --format='%an' "$sha")
            subject=$(git log -1 --format='%s' "$sha")
            files=$(git diff-tree --no-commit-id --name-only -r "$sha")

            assessment=""
            if [ -n "$IGNORE_REGEX" ] && echo "$subject" | grep -qE "$IGNORE_REGEX"; then
              assessment="ignored"
              echo "  ignored                $sha  $subject"
              ignored=$((ignored + 1))
            elif [[ "$author_email" == *"dependabot[bot]"* ]]; then
              assessment="safe"
              echo "  safe (dependabot)      $sha  $subject"
              count=$((count + 1))
            elif [[ "$subject" == "chore(deps):"* ]]; then
              assessment="safe"
              echo "  safe (chore(deps))     $sha  $subject"
              count=$((count + 1))
            else
              case "$subject" in
                "build:"* | "build("*"):"*)
                  assessment="safe"
                  echo "  safe (build)           $sha  $subject"
                  count=$((count + 1))
                  ;;
                *)
                  if [[ "$subject" == "docs:"* ]]; then
                    assessment="safe"
                    echo "  safe (docs)            $sha  $subject"
                    count=$((count + 1))
                  elif [ "$subject" = "chore: update helm chart version" ]; then
                    assessment="safe"
                    echo "  safe (legacy chart-bump)  $sha  $subject"
                    count=$((count + 1))
                  elif [ "$files" = ".trivyignore.yml" ]; then
                    assessment="safe"
                    echo "  safe (.trivyignore.yml only)  $sha  $subject"
                    count=$((count + 1))
                  else
                    assessment="blocking"
                    echo "  UNSAFE                 $sha  $subject"
                    [ -z "$unsafe_sha" ] && unsafe_sha="$sha"
                    unsafe_count=$((unsafe_count + 1))
                    count=$((count + 1))
                  fi
                  ;;
              esac
            fi

            all_rows+="| \`${sha:0:7}\` | ${author_name//|/\\|} | ${subject//|/\\|} | ${assessment} |"$'\n'
          done <<< "$commits"

          echo "commit_count=$count" >> "$GITHUB_OUTPUT"
          safe_count=$((count - unsafe_count))

          if [ "$count" -eq 0 ]; then
            outcome=no-commits
            echo "outcome=no-commits" >> "$GITHUB_OUTPUT"
            echo "No releasable commits since ${LATEST_TAG} (${ignored} ignored)"
          elif [ "$FORCE_RELEASE" = "true" ] && [ -n "$unsafe_sha" ]; then
            outcome=safe-forced
            echo "FORCE_RELEASE: overriding ${count} commit(s) (first unsafe ${unsafe_sha}) to outcome=safe"
            echo "outcome=safe" >> "$GITHUB_OUTPUT"
          elif [ -n "$unsafe_sha" ]; then
            outcome=skip-unsafe
            echo "outcome=skip-unsafe" >> "$GITHUB_OUTPUT"
            echo "unsafe_sha=${unsafe_sha:0:7}" >> "$GITHUB_OUTPUT"
          else
            outcome=safe
            echo "outcome=safe" >> "$GITHUB_OUTPUT"
          fi

          {
            case "$outcome" in
              safe-forced) echo "## :warning: Force-release — bypassing ${unsafe_count} blocking commit(s) since \`${LATEST_TAG}\`" ;;
              skip-unsafe) echo "## :no_entry_sign: Release skipped — ${unsafe_count} blocking commit(s) since \`${LATEST_TAG}\`" ;;
              safe)        echo "## :rocket: Auto-release — ${count} commit(s) since \`${LATEST_TAG}\`" ;;
              no-commits)  echo "## :zzz: No releasable commits — ${ignored} ignored since \`${LATEST_TAG}\`" ;;
            esac
            echo ""
            echo "| Commit | Author | Subject | Assessment |"
            echo "|---|---|---|---|"
            printf '%s' "$all_rows"
            echo ""
            echo "**Totals:** ${safe_count} safe · ${unsafe_count} blocking · ${ignored} ignored"
          } >> "$GITHUB_STEP_SUMMARY"

          [ "$outcome" = "no-commits" ] && exit 0

      - name: Compute next version and changelog bullets
        if: steps.evaluate.outputs.outcome == 'safe'
        id: next
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
          RELEASE_TYPE: ${{ inputs.release_type }}
          IGNORE_REGEX: ${{ inputs.changelog_ignore_regex }}
        run: |
          set -euo pipefail

          ver="${LATEST_TAG#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "$RELEASE_TYPE" in
            major) next="v$((major + 1)).0.0" ;;
            minor) next="v${major}.$((minor + 1)).0" ;;
            patch) next="v${major}.${minor}.$((patch + 1))" ;;
            *)     echo "::error::Unknown release_type '$RELEASE_TYPE' (expected major|minor|patch)"; exit 1 ;;
          esac
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (bump=$RELEASE_TYPE)"

          subjects=$(git log --no-merges --format='%s' "${LATEST_TAG}..HEAD")
          if [ -n "$IGNORE_REGEX" ]; then
            subjects=$(echo "$subjects" | grep -vE "$IGNORE_REGEX" || true)
          fi
          bullets=$(echo "$subjects" | sed '/^$/d' | sort -u | sed 's/^/- /')
          [ -z "$bullets" ] && bullets="- Maintenance release"
          echo "Changelog bullets:"
          echo "$bullets" | sed 's/^/  /'
          {
            echo 'changelog<<CHANGELOG_EOF'
            echo "$bullets"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG, commit & tag
        if: steps.evaluate.outputs.outcome == 'safe' && !inputs.dry_run
        env:
          NEXT_VERSION: ${{ steps.next.outputs.version }}
          BULLETS: ${{ steps.next.outputs.changelog }}
        run: |
          set -euo pipefail

          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found in repo root"
            exit 1
          fi
          if ! head -1 CHANGELOG.md | grep -q '^# Changelog'; then
            echo "::error::CHANGELOG.md does not start with '# Changelog'"
            exit 1
          fi

          {
            printf '# Changelog\n\n'
            printf '## %s\n\n' "$NEXT_VERSION"
            printf '%s\n\n' "$BULLETS"
            tail -n +3 CHANGELOG.md
          } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${NEXT_VERSION}"
          git tag "$NEXT_VERSION"
          git push --atomic origin main "$NEXT_VERSION"

      - name: Dry-run preview
        if: steps.evaluate.outputs.outcome == 'safe' && inputs.dry_run
        env:
          NEXT_VERSION: ${{ steps.next.outputs.version }}
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
          COMMIT_COUNT: ${{ steps.evaluate.outputs.commit_count }}
          BULLETS: ${{ steps.next.outputs.changelog }}
        run: |
          echo "DRY RUN: would release ${NEXT_VERSION} (${COMMIT_COUNT} safe commits since ${LATEST_TAG})"
          echo "DRY RUN: would prepend the following section to CHANGELOG.md:"
          printf '  ## %s\n\n' "$NEXT_VERSION"
          echo "$BULLETS" | sed 's/^/  /'
          echo ""
          echo "DRY RUN: would commit 'chore: update changelog for ${NEXT_VERSION}', tag ${NEXT_VERSION}, push atomically"
          echo "DRY RUN: Slack notification suppressed"

      - name: Notify Slack on release
        if: steps.evaluate.outputs.outcome == 'safe' && !inputs.dry_run
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "${{ inputs.slack_channel }}",
              "text": ":rocket: ${{ github.repository }} ${{ inputs.force_release && 'released' || 'auto-released' }} ${{ steps.next.outputs.version }} (${{ steps.evaluate.outputs.commit_count }} commits since ${{ steps.latest.outputs.tag }}) — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>"
            }

      - name: Notify Slack on skip-unsafe
        if: steps.evaluate.outputs.outcome == 'skip-unsafe' && !inputs.dry_run
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "${{ inputs.slack_channel }}",
              "text": ":no_entry_sign: ${{ github.repository }} skipped Monday auto-release: ${{ steps.evaluate.outputs.commit_count }} commit(s) since ${{ steps.latest.outputs.tag }}, first unsafe `${{ steps.evaluate.outputs.unsafe_sha }}` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>"
            }

##
# This workflow is triggered on a schedule and deletes old container images from the GitHub Container Registry.
##

name: ghcr-cleanup

on:
  workflow_call:
    inputs:
      dry-run:
        type: boolean
        default: false
        description: if true, no images will be deleted
    secrets:
      token:
        required: true
        description: GitHub PAT with repo permissions

jobs:
  ghcr-cleanup:
    name: Delete old container images
    runs-on: ubuntu-latest
    steps:
      - name: Delete old non-release images
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.token }}
          owner: ${{ github.repository_owner }}
          package: ${{ github.event.repository.name }}
          dry-run: ${{ inputs.dry-run }}
          use-regex: true
          exclude-tags: '^(v?(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?|main|latest)$'
          older-than: 30 days
          keep-n-untagged: 10
          validate: true

      - name: Delete all images older than 3 years
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.token }}
          owner: ${{ github.repository_owner }}
          package: ${{ github.event.repository.name }}
          dry-run: true # TODO: forced dry-run while validating the 3-year cleanup; revert to ${{ inputs.dry-run }} once confirmed
          # No exclude-tags here: even release/main/latest tags are deleted once older than 3 years.
          older-than: 3 years
          keep-n-tagged: 0
          delete-untagged: true
          validate: true
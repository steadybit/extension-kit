##
# This workflow is triggered on a schedule and deletes old container images from the GitHub Container Registry.
##

name: ghcr-cleanup

on:
  workflow_call:
    inputs:
      dry-run:
        type: boolean
        default: false
        description: if true, no images will be deleted
    secrets:
      token:
        required: true
        description: GitHub PAT with repo permissions

jobs:
  ghcr-cleanup:
    name: Delete old container images
    runs-on: ubuntu-latest
    steps:
      - name: Delete old non-release images
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          token: ${{ secrets.token }}
          owner: ${{ github.repository_owner }}
          package: ${{ github.event.repository.name }}
          dry-run: ${{ inputs.dry-run }}
          use-regex: true
          exclude-tags: '^(v?\d+\.\d+\.\d+[-+.0-9A-Za-z]*|main|latest)$'
          older-than: 30 days
          keep-n-untagged: 10
          validate: true

      - name: Delete all images older than 1 year
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          token: ${{ secrets.token }}
          owner: ${{ github.repository_owner }}
          package: ${{ github.event.repository.name }}
          dry-run: true # TODO: forced dry-run while validating the 1-year cleanup; revert to ${{ inputs.dry-run }} once confirmed
          # No exclude-tags here: even release/main/latest tags are deleted once older than 1 year.
          older-than: 1 year
          keep-n-tagged: 0
          delete-untagged: true
          validate: true